name: AI/ML & Backend CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - 'AI/ML'
      - 'backend'
  pull_request:
    branches:
      - 'main'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ai-quality-gate:
    if: |
      (github.event_name == 'push' && github.ref_name == 'AI/ML') ||
      (github.event_name == 'pull_request' && (
        github.head_ref == 'AI/ML' ||
        github.head_ref == 'promotion/ai-ml-to-main'
      ))
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Detect project directory
        id: project
        shell: bash
        run: |
          if [ -f requirements.txt ] && [ -d app ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
          elif [ -f ai_app/requirements.txt ] && [ -d ai_app/app ]; then
            echo "dir=ai_app" >> "$GITHUB_OUTPUT"
          else
            echo "Unable to locate the AI project directory."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ${{ steps.project.outputs.dir }}
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Lint
        working-directory: ${{ steps.project.outputs.dir }}
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests with coverage
        working-directory: ${{ steps.project.outputs.dir }}
        env:
          INTERNAL_API_KEY: test-api-key
          INTERNAL_API_SECRET: test-api-secret
          MYSQL_PASSWORD: test-password
          GEMINI_API_KEY: test-gemini-key
        run: |
          pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=35

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ steps.project.outputs.dir }}/coverage.xml

  backend-quality-gate:
    if: |
      (github.event_name == 'push' && github.ref_name == 'backend') ||
      (github.event_name == 'pull_request' && (
        github.head_ref == 'backend' ||
        github.head_ref == 'promotion/backend-to-main'
      ))
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Run lint (if present)
        run: npm run lint --if-present

      - name: Run tests (if present)
        env:
          NODE_ENV: test
        run: npm test --if-present

      - name: Build
        run: npm run build
