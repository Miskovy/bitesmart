name: Deprecated - Backend CI/CD (Do Not Use)

on:
  workflow_dispatch:

concurrency:
  group: backend-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deprecated-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Deprecated notice
        run: |
          echo "This legacy workflow is deprecated."
          echo "Use .github/workflows/ci.yml and .github/workflows/promote_backend_to_main.yml instead."
