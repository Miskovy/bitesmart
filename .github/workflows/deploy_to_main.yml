name: Promote AI/ML to Main

on:
  pull_request:
    branches:
      - 'main'
    types:
      - closed
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Source ref to promote into main/ai_app'
        required: true
        default: 'AI/ML'

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'AI/ML')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout approved AI/ML source
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: 'source'

      - name: Checkout source for manual promotion
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          path: 'source'

      - name: Checkout Main branch
        uses: actions/checkout@v4
        with:
          ref: 'main'
          path: 'target'

      - name: Sync AI/ML to main/ai_app
        run: |
          rm -rf target/ai_app
          mkdir -p target/ai_app
          rsync -av --exclude='.git' source/ target/ai_app/

      - name: Commit and Push to main
        run: |
          cd target
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai_app/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Promote AI/ML to ai_app after approval"
            git push origin main
          fi
