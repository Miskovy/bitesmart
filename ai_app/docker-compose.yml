services:
  # ── Bitesmart AI API ──────────────────────────────────────────────
  api:
    build: .
    container_name: bitesmart-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage  # Mount models from host (avoids baking ~500MB into image)

  # ── MySQL Database ────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: bitesmart-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
