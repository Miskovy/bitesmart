name: Deploy AI/ML to Main

on:
  push:
    branches:
      - 'AI/ML'

jobs:
  check-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout AI/ML branch
        uses: actions/checkout@v4
        with:
          ref: 'AI/ML'
          path: 'source'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          cd source
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        run: |
          cd source
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all other errors as warnings.
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test with pytest (Placeholder)
        run: |
          cd source
          echo "No tests configured yet. Skipping pytest..."
          # pytest

      - name: Checkout Main branch
        uses: actions/checkout@v4
        with:
          ref: 'main'
          path: 'target'

      - name: Sync AI/ML to main/ai_app
        run: |
          # Clear the existing target/ai_app directory if it exists
          rm -rf target/ai_app
          mkdir -p target/ai_app
          
          # Sync from source to target/ai_app (exclude git files)
          rsync -av --exclude='.git' source/ target/ai_app/

      - name: Commit and Push to main
        run: |
          cd target
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add ai_app/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated deployment: AI/ML branch to ai_app folder"
            git push origin main
          fi
