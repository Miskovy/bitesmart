<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Bitesmart AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #006c0a;
      --primary-container: #258622;
      --on-primary: #ffffff;
      --background: #f6fbee;
      --on-background: #171d15;
      --surface: #ffffff;
      --surface-variant: #dfe4d8;
      --on-surface: #171d15;
      --on-surface-variant: #3f4a3b;
      --outline: #6f7a6a;
      
      --shadow-soft: 0 10px 40px -10px rgba(0, 108, 10, 0.15);
      --shadow-fab: 0 10px 25px -5px rgba(0, 108, 10, 0.3);
      
      --radius-2xl: 16px;
      --radius-3xl: 24px;
      --radius-full: 9999px;
      
      --font-family: 'Epilogue', sans-serif;

      /* Macro Colors */
      --macro-protein: #d8e2ff;
      --macro-carbs: #ffdf9a;
      --macro-fats: #ffdad6;
      --macro-veggie: #97f986;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--background);
      color: var(--on-background);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Ambient Background Blurs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      opacity: 0.7;
    }
    .blob-veggie {
      top: -10%; left: -10%;
      width: 450px; height: 450px;
      background: var(--macro-veggie);
      animation: ambientShift 12s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
    }
    .blob-protein {
      bottom: -10%; right: -10%;
      width: 500px; height: 500px;
      background: var(--macro-protein);
      animation: ambientShift 15s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate-reverse;
    }

    @keyframes ambientShift {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -40px) scale(1.1); }
      100% { transform: translate(-20px, 20px) scale(0.9); }
    }

    /* Container */
    .app-container {
      max-width: 480px;
      width: 100%;
      padding: 1.5rem;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      z-index: 1;
      position: relative;
      perspective: 1000px;
    }

    /* Levitating Card */
    .error-card {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      padding: 4rem 2.5rem;
      border-radius: var(--radius-3xl);
      box-shadow: var(--shadow-soft);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-top: 1px solid rgba(255, 255, 255, 1);
      border-left: 1px solid rgba(255, 255, 255, 1);
      width: 100%;
      animation: levitate 6s ease-in-out infinite;
      transform-style: preserve-3d;
    }

    @keyframes levitate {
      0% { transform: translateY(0) rotateX(2deg) rotateY(-2deg); box-shadow: 0 10px 40px -10px rgba(0, 108, 10, 0.15); }
      50% { transform: translateY(-15px) rotateX(-1deg) rotateY(1deg); box-shadow: 0 30px 50px -15px rgba(0, 108, 10, 0.25); }
      100% { transform: translateY(0) rotateX(2deg) rotateY(-2deg); box-shadow: 0 10px 40px -10px rgba(0, 108, 10, 0.15); }
    }

    /* Art Container styling */
    .art-stage {
      position: relative;
      width: 160px;
      height: 160px;
      margin: 0 auto 3rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Radar/Pulse waves behind the plate */
    .pulse-ring {
      position: absolute;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 2px solid var(--primary);
      opacity: 0;
      animation: radar 3s cubic-bezier(0.2, 0.6, 0.2, 1) infinite;
    }
    .pulse-ring:nth-child(2) {
      animation-delay: 1s;
    }
    .pulse-ring:nth-child(3) {
      animation-delay: 2s;
    }

    @keyframes radar {
      0% { transform: scale(1); opacity: 0.8; border-width: 4px; }
      100% { transform: scale(2.2); opacity: 0; border-width: 1px; }
    }

    /* Core plate */
    .core-plate {
      position: relative;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle at 30% 30%, #ffffff, #dfe4d8);
      border-radius: 50%;
      box-shadow: 
        inset -5px -5px 15px rgba(0,0,0,0.05),
        2px 10px 20px rgba(0, 108, 10, 0.15);
      border: 4px solid #ffffff;
      z-index: 2;
    }

    .plate-inner {
      position: absolute;
      top: 15%; left: 15%;
      width: 70%; height: 70%;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.6);
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
    }

    /* Orbiting elements */
    .orbit-container {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      animation: galaxyOrbit 12s linear infinite;
      z-index: 3;
    }

    /* The disconnected missing slice acting like a satellite */
    .missing-slice {
      position: absolute;
      top: -10px; left: 50px;
      width: 40px; height: 40px;
      background: var(--macro-carbs);
      clip-path: polygon(50% 100%, 0 0, 100% 0);
      /* Make it curve slightly like a pie slice */
      border-radius: 10px 10px 0 0;
      box-shadow: 0 10px 20px rgba(117, 88, 0, 0.3);
      animation: sliceSpin 4s ease-in-out infinite alternate;
    }

    @keyframes galaxyOrbit {
      100% { transform: rotate(360deg); }
    }
    
    @keyframes sliceSpin {
      0% { transform: rotate(-20deg) scale(0.9); }
      100% { transform: rotate(30deg) scale(1.1); box-shadow: 0 15px 25px rgba(117, 88, 0, 0.5); }
    }

    /* Floating particles */
    .particle {
      position: absolute;
      border-radius: 50%;
      background: var(--macro-protein);
    }
    .p1 { width: 8px; height: 8px; top: 20%; left: -20%; animation: float 3s infinite alternate; }
    .p2 { width: 12px; height: 12px; bottom: 10%; right: -30%; background: var(--primary); animation: float 5s infinite alternate-reverse; }

    /* Typography */
    .hero-number {
      font-size: 88px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, var(--primary), var(--primary-container));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      position: relative;
    }

    .headline {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 1rem;
      color: var(--on-surface);
    }

    .body-text {
      font-size: 16px;
      color: var(--outline);
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    /* Buttons */
    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    .primary-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: var(--primary);
      color: var(--on-primary);
      padding: 1rem 1.5rem;
      border-radius: var(--radius-full);
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      box-shadow: var(--shadow-fab);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      gap: 0.5rem;
      flex: 1;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .primary-button:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 15px 30px -5px rgba(0, 108, 10, 0.5);
      background-color: var(--primary-container);
    }

    .secondary-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: transparent;
      color: var(--on-surface-variant);
      padding: 1rem 1.25rem;
      border-radius: var(--radius-full);
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid var(--outline);
      text-decoration: none;
      gap: 0.5rem;
    }

    .secondary-button:hover {
      background-color: rgba(223, 228, 216, 0.5);
      color: var(--on-surface);
      border-color: var(--on-surface-variant);
    }

  </style>
</head>
<body>
  <!-- Global Bitesmart Logo -->
  <div class="brand-logo" style="position: absolute; top: 2rem; left: 2rem; display: flex; align-items: center; gap: 0.75rem; z-index: 100; cursor: pointer;" onclick="window.location.href='/'">
    <div style="background: linear-gradient(135deg, #006c0a 0%, #97f986 100%); width: 44px; height: 44px; border-radius: 14px; display: flex; justify-content: center; align-items: center; box-shadow: 0 8px 16px rgba(0, 108, 10, 0.4); transform: rotate(-5deg); transition: transform 0.3s ease;" onmouseover="this.style.transform='rotate(5deg) scale(1.1)'" onmouseout="this.style.transform='rotate(-5deg)'">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
         <path d="M12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2C6.48 2 2 6.48 2 12C2 13.5 2.5 15.5 3 17L2 22L7 21C8.5 21.5 10.5 22 12 22Z" fill="rgba(255,255,255,0.1)"></path>
         <path d="M8 12C8 10.5 9.5 9 12 9C14.5 9 16 10.5 16 12"></path>
         <path d="M12 12V16"></path>
         <circle cx="12" cy="16" r="1.5" fill="white"></circle>
      </svg>
    </div>
    <div style="display: flex; flex-direction: column;">
      <span style="font-weight: 900; font-size: 24px; line-height: 1; letter-spacing: -0.06em; color: var(--on-surface);">Bite<span style="color: transparent; background-clip: text; -webkit-background-clip: text; background-image: linear-gradient(90deg, #006c0a, #4bae4f);">Smart</span><span style="color: #4bae4f; font-size: 28px;">.</span></span>
      <span style="font-size: 10px; font-weight: 700; letter-spacing: 0.2em; color: #6f7a6a; text-transform: uppercase;">Intelligent Nutrition</span>
    </div>
  </div>

  <div class="blob blob-veggie"></div>
  <div class="blob blob-protein"></div>
  
  <div class="app-container">
    <div class="error-card">
      
      <!-- Stunning CSS-based Animated Art -->
      <div class="art-stage">
        <!-- Expanding radar rings -->
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        
        <!-- The Main Plate -->
        <div class="core-plate">
          <div class="plate-inner"></div>
        </div>

        <!-- The orbiting missing piece -->
        <div class="orbit-container">
          <div class="missing-slice"></div>
          <div class="particle p1"></div>
          <div class="particle p2"></div>
        </div>
      </div>

      <h1 class="hero-number">404</h1>
      <h2 class="headline">Dish Not on the Menu</h2>
      <p class="body-text">We scanned the kitchen, but this recipe appears to have drifted completely out of orbit. Let's redirect you back to safety.</p>
      
      <div class="actions">
        <!-- Return dynamically to the previous route -->
        <button onclick="window.history.back()" class="secondary-button" aria-label="Go to previous page">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 18px; height: 18px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
          </svg>
          Go Back
        </button>
        
        <!-- Dashboard Button -->
        <a href="/dashboard" class="primary-button" aria-label="Navigate to dashboard">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 18px; height: 18px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
          </svg>
          Dashboard
        </a>
      </div>
    </div>
  </div>
</body>
</html>
