<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitesmart AI - Core API</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #006c0a;
      --primary-container: #258622;
      --on-primary: #ffffff;
      --background: #f6fbee;
      --on-background: #171d15;
      --surface: #ffffff;
      --surface-variant: #dfe4d8;
      --on-surface: #171d15;
      --on-surface-variant: #3f4a3b;
      --outline: #6f7a6a;
      
      --shadow-soft: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
      --font-family: 'Epilogue', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-family);
      background-color: var(--background);
      color: var(--on-background);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Abstract Blobs for Artistic Touch */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      opacity: 0.6;
      animation: float 20s infinite alternate ease-in-out;
    }
    .blob-1 { top: -10%; left: -10%; width: 40vw; height: 40vw; background: #97f986; animation-delay: 0s; }
    .blob-2 { bottom: -10%; right: -10%; width: 50vw; height: 50vw; background: #d8e2ff; animation-delay: -5s; }
    .blob-3 { top: 30%; right: 20%; width: 25vw; height: 25vw; background: #ffdf9a; animation-delay: -10s; }

    @keyframes float {
      0% { transform: translateY(0) scale(1); }
      50% { transform: translateY(50px) scale(1.05); }
      100% { transform: translateY(-30px) scale(0.95); }
    }

    .container {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 24px;
      padding: 4rem;
      max-width: 600px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 3rem;
      font-weight: 900;
      color: var(--on-surface);
      margin-bottom: 1rem;
      letter-spacing: -0.05em;
    }
    h1 span {
      color: transparent;
      background-clip: text;
      -webkit-background-clip: text;
      background-image: linear-gradient(90deg, #006c0a, #4bae4f);
    }

    p {
      color: var(--on-surface-variant);
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 3rem;
    }

    .nav-buttons {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 2rem;
      border-radius: 16px;
      font-weight: 600;
      font-size: 1.05rem;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-soft);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      border: 2px solid transparent;
    }
    .btn-primary:hover {
      background: var(--primary-container);
      transform: translateY(-4px);
      box-shadow: 0 10px 20px rgba(0, 108, 10, 0.2);
    }

    .btn-secondary {
      background: white;
      color: var(--on-surface);
      border: 2px solid var(--surface-variant);
    }
    .btn-secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
      transform: translateY(-4px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
    }

    .btn svg {
      width: 20px;
      height: 20px;
    }
  </style>
</head>
<body>

  <!-- Global Bitesmart Logo -->
  <div class="brand-logo" style="position: absolute; top: 2rem; left: 2rem; display: flex; align-items: center; gap: 0.75rem; z-index: 100; cursor: pointer;" onclick="window.location.href='/'">
    <div style="background: linear-gradient(135deg, #006c0a 0%, #97f986 100%); width: 44px; height: 44px; border-radius: 14px; display: flex; justify-content: center; align-items: center; box-shadow: 0 8px 16px rgba(0, 108, 10, 0.4); transform: rotate(-5deg); transition: transform 0.3s ease;" onmouseover="this.style.transform='rotate(5deg) scale(1.1)'" onmouseout="this.style.transform='rotate(-5deg)'">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
         <path d="M12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2C6.48 2 2 6.48 2 12C2 13.5 2.5 15.5 3 17L2 22L7 21C8.5 21.5 10.5 22 12 22Z" fill="rgba(255,255,255,0.1)"></path>
         <path d="M8 12C8 10.5 9.5 9 12 9C14.5 9 16 10.5 16 12"></path>
         <path d="M12 12V16"></path>
         <circle cx="12" cy="16" r="1.5" fill="white"></circle>
      </svg>
    </div>
    <div style="display: flex; flex-direction: column;">
      <span style="font-weight: 900; font-size: 24px; line-height: 1; letter-spacing: -0.06em; color: var(--on-surface);">Bite<span style="color: transparent; background-clip: text; -webkit-background-clip: text; background-image: linear-gradient(90deg, #006c0a, #4bae4f);">Smart</span><span style="color: #4bae4f; font-size: 28px;">.</span></span>
      <span style="font-size: 10px; font-weight: 700; letter-spacing: 0.2em; color: #6f7a6a; text-transform: uppercase;">Intelligent Nutrition</span>
    </div>
  </div>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <main class="container">
    <h1>Welcome to <span>Bitesmart AI</span></h1>
    <p>Your intelligent vision and nutrition processing core is running securely. What would you like to explore next?</p>
    
    <div class="nav-buttons">
      <a href="/docs" class="btn btn-primary">
        <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
        </svg>
        API Documentation
      </a>
      <a href="/health" class="btn btn-secondary">
        <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
        </svg>
        System Health
      </a>
    </div>
  </main>

  <footer style="position: absolute; bottom: 2rem; color: var(--outline); font-size: 0.9rem; font-weight: 600;">
    &copy; 2026 Bitesmart AI Platform.
  </footer>
</body>
</html>
